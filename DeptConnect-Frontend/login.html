<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to DeptConnect — your department management portal.">
    <title>Login — DeptConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-50 font-inter antialiased min-h-screen flex items-center justify-center p-4">

    <!-- Toast -->
    <div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-2"></div>

    <div class="w-full max-w-md">
        <!-- Logo & Back -->
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 text-sm text-slate-400 hover:text-indigo-600 transition-colors mb-6">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Back to Home
            </a>
            <div class="flex items-center justify-center gap-3 mb-2">
                <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center text-white font-bold text-sm shadow-lg shadow-indigo-200">DC</div>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 mt-4">Welcome back</h1>
            <p class="text-sm text-slate-500 mt-1">Sign in to your DeptConnect account</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-8">
            <form id="login-form" class="space-y-5">
                <div>
                    <label for="login-email" class="block text-sm font-medium text-slate-700 mb-1.5">Email Address</label>
                    <input id="login-email" type="email" required autocomplete="email" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm transition-all" placeholder="you@example.com">
                </div>
                <div>
                    <label for="login-password" class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                    <input id="login-password" type="password" required autocomplete="current-password" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm transition-all" placeholder="••••••••">
                </div>
                <!-- Inline Error Message -->
                <div id="login-error" class="hidden py-3 px-4 rounded-xl bg-red-50 text-red-400 text-sm text-center transition-all duration-300">
                    <span id="login-error-text">Invalid email or password</span>
                </div>

                <button type="submit" class="w-full py-3 bg-indigo-600 text-white font-semibold rounded-xl hover:bg-indigo-700 transition-colors shadow-sm shadow-indigo-200 text-sm">
                    Sign In
                </button>
            </form>
        </div>

        <p class="text-center mt-6 text-sm text-slate-500">
            Don't have an account? <a href="signup.html" class="text-indigo-600 font-semibold hover:underline">Create one</a>
        </p>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
