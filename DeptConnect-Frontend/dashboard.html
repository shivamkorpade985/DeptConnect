<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="DeptConnect Dashboard — Manage your department's announcements, documents, and leave requests.">
    <title>Dashboard — DeptConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-slate-50 font-inter antialiased min-h-screen">

    <!-- Toast -->
    <div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-2"></div>

    <!-- Modal Container -->
    <div id="modal-container"></div>

    <!-- Navbar -->
    <nav id="main-navbar" class="sticky top-0 z-40 bg-white/95 backdrop-blur-xl border-b border-slate-100 shadow-sm">
    </nav>

    <!-- Tab Bar -->
    <div id="tab-bar" class="bg-white border-b border-slate-100">
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div id="main-content">
            <div class="flex justify-center py-20">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600"></div>
            </div>
        </div>
    </main>

    <!-- Scripts (order matters) -->
    <script src="js/api.js"></script>
    <script src="js/announcements.js"></script>
    <script src="js/documents.js"></script>
    <script src="js/leaves.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
